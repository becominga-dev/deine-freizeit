<header>

 <h2>Events &<br>Veranstaltungen</h2>


<section class="interactive">

  <div id="filterContainer">
	<label for="filterSelect" style="margin-right:8px; font-weight:bold; color:#013237;">Filter:</label>
	<select id="filterSelect">
	  <option value="all">Alle Events</option>
	  <option value="free">Kostenlos</option>
	  <option value="low">Günstig</option>
	  <option value="medium">Mittleres Budget</option>
	  <option value="high">Teuer</option>
	</select>
  </div>

  <div class="calendar">
	<div class="calendar-header">
	  <span class="arrow" onclick="changeMonth(-1)">&#8592;</span>
	  <span id="monthYear"></span>
	  <span class="arrow" onclick="changeMonth(1)">&#8594;</span>
	</div>

	<div class="calendar-days">
	  <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
	</div>
	<div class="calendar-dates" id="calendarDates"></div>
  </div>

  <div class="event-box" id="eventBox">
	<h3>Veranstaltungen am <span id="selectedDate"></span></h3>

  </div>

  <!-- Erinnerungspopup -->
  <div id="reminderPopup">

	<input type="email" id="emailInput" placeholder="Deine E-Mail-Adresse" />
	<br>

 </section>

  <script>
	// DOM-Elemente holen
	const hamburger = document.getElementById('hamburger');
	const sideMenu = document.getElementById('sideMenu');
	const closeBtn = document.getElementById('closeBtn');

	// Menü öffnen
	hamburger.addEventListener('click', () => {

	sideMenu.style.display = 'flex';
	  // Timeout sorgt dafür, dass der Übergang sichtbar wird
	  setTimeout(() => {
		sideMenu.classList.add('open');
	  }, 10);
	});
	  //sideMenu.classList.add('open'); }); //

	

	// Menü schließen
closeBtn.addEventListener('click', () => {
	  sideMenu.classList.remove('open');

	
	setTimeout(() => {
sideMenu.style.display = 'none';
	  }, 300); // Warte bis Übergang abgeschlossen ist
	
	});
	
	
	

	
  </script>
  
  

<script>
  const monthYearEl = document.getElementById("monthYear");
	const calendarDates = document.getElementById("calendarDates");
	const eventBox = document.getElementById("eventBox");
	const selectedDateEl = document.getElementById("selectedDate");
	const eventList = document.getElementById("eventList");
	const filterSelect = document.getElementById("filterSelect");

	let currentMonth = new Date().getMonth();
	let currentYear = new Date().getFullYear();
	let currentFilter = "all";

	// Events direkt im Code:
	const events = {
	  "2025-07-05": [
		{ title: "🎉 Stadtfest", priceCategory: "free" },
		{ title: "🎭 Theateraufführung", priceCategory: "medium" }
	  ],
	  "2025-07-10": [
		{ title: "🎬 Open-Air-Kino", priceCategory: "low" }
	  ],
	  "2025-07-15": [
		{ title: "🎶 Klassikkonzert", priceCategory: "high" }
	  ]
	};

	function renderCalendar(month, year) {
	  const firstDay = new Date(year, month).getDay();
	  const daysInMonth = new Date(year, month + 1, 0).getDate();
	  const weekdaysOffset = firstDay === 0 ? 6 : firstDay - 1;

	  calendarDates.innerHTML = "";
	  monthYearEl.textContent = new Date(year, month).toLocaleDateString("de-DE", {
		month: "long", year: "numeric"
	  });

	  for (let i = 0; i < weekdaysOffset; i++) {
		const emptyDiv = document.createElement("div");
		emptyDiv.classList.add("inactive");
		calendarDates.appendChild(emptyDiv);
	  }

	  for (let d = 1; d <= daysInMonth; d++) {
		const dateDiv = document.createElement("div");
		dateDiv.textContent = d;
		const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

		const eventsForDay = events[dateStr];
		const hasEventsFiltered = eventsForDay && eventsForDay.some(ev => currentFilter === "all" || ev.priceCategory === currentFilter);

		if (hasEventsFiltered) {
		  dateDiv.style.backgroundColor = "#FFB86B";
		  dateDiv.style.color = "#013237";
		} else {
		  dateDiv.style.backgroundColor = "#4CA771";
		  dateDiv.style.color = "white";
		}

		dateDiv.addEventListener("click", () => showEvents(dateStr));
		calendarDates.appendChild(dateDiv);
	  }
	}

	function changeMonth(offset) {
	  currentMonth += offset;
	  if (currentMonth < 0) {
		currentMonth = 11;
		currentYear--;
	  } else if (currentMonth > 11) {
		currentMonth = 0;
		currentYear++;
	  }
	  eventBox.style.display = "none";
	  renderCalendar(currentMonth, currentYear);
	}

	function showEvents(dateStr) {
	  selectedDateEl.textContent = new Date(dateStr).toLocaleDateString("de-DE");
	  const items = events[dateStr];
	  eventList.innerHTML = "";

	  if (items && items.length) {
		const filteredItems = items.filter(ev => currentFilter === "all" || ev.priceCategory === currentFilter);

		if (filteredItems.length > 0) {
		  filteredItems.forEach(event => {
			const li = document.createElement("li");
			li.innerHTML = `
			  <strong>${event.title}</strong> (${event.priceCategory})
			  <br/>
			  <button onclick="showReminderPopup('${event.title}', '${dateStr}')" style="
				margin-top: 5px;
				background-color: #FFB86B;
				color: #013237;
				border: none;
				padding: 5px 10px;
				border-radius: 5px;
				cursor: pointer;
			  ">Erinnere mich</button>
			`;
			eventList.appendChild(li);
		  });
		} else {
		  const li = document.createElement("li");
		  li.textContent = "Keine Veranstaltungen für diesen Filter";
		  eventList.appendChild(li);
		}
	  } else {
		const li = document.createElement("li");
		li.textContent = "Keine Veranstaltungen";
		eventList.appendChild(li);
	  }

	  eventBox.style.display = "block";
	}

	filterSelect.addEventListener("change", () => {
	  currentFilter = filterSelect.value;
	  eventBox.style.display = "none";
	  renderCalendar(currentMonth, currentYear);
	});

	// Reminder-Funktion
	let selectedEventTitle = "";
	let selectedEventDate = "";

	function showReminderPopup(title, dateStr) {
	  selectedEventTitle = title;
	  selectedEventDate = dateStr;
	  document.getElementById("popupEventInfo").innerText = `"${title}" am ${new Date(dateStr).toLocaleDateString("de-DE")}`;
	  document.getElementById("reminderPopup").style.display = "block";
	}

	function closePopup() {
	  document.getElementById("reminderPopup").style.display = "none";
	  document.getElementById("emailInput").value = "";
	}

	function sendReminder() {
	  const email = document.getElementById("emailInput").value;
	  if (!email || !email.includes("@")) {
		alert("Bitte eine gültige E-Mail-Adresse eingeben.");
		return;
	  }

	  // Hier kann man die Daten z. B. per fetch() an ein Backend senden
	  alert(`Erinnerung wird gesendet an ${email} für "${selectedEventTitle}" am ${new Date(selectedEventDate).toLocaleDateString("de-DE")}`);
	  closePopup();
	}

	renderCalendar(currentMonth, currentYear);
</script>
